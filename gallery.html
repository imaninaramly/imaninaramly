<script>
function setActiveNav() {

  let current = location.pathname.split("/").pop();

  // kalau buka domain root
  // contoh: yoursite.com/
  if (current === "") {
    current = "index.html";
  }

  document.querySelectorAll(".nav-link").forEach(link => {

    const href = link.getAttribute("href");

    if (href === current) {

      link.classList.add(
        "bg-purple-100",
        "text-purple-800",
        "font-semibold"
      );

    }

  });

}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(setActiveNav, 100);
});
</script>
<script src="includes.js"></script>

  <script>
function openBlog(id) {
  const modal = document.getElementById("blogModal");
  const content = document.getElementById("blogContent");

  let blogData = "";

  if (id === "blog1") {
    blogData = `
      <span class="text-xs px-3 py-1 rounded-full bg-purple-100 text-purple-700">
        Dev Story
      </span>

      <h2 class="text-2xl font-semibold text-gray-900 mt-3">
        Learning Laravel Routes: My First Confusing But Eye-Opening Moment
      </h2>

      <p>
        When I first started learning Laravel, I honestly didn’t understand what was going on with routes/web.php.
      </p>

      <p>
        I remember seeing <code>Route::get('/', function () { return view('welcome'); });</code> and thinking it was magic.
      </p>

      <p>
        But everything changed when I created my first /about route and it actually worked.
      </p>

      <p>
        That moment made me realize: web.php is basically the “map” of a Laravel application.
      </p>
    `;
  }

  content.innerHTML = blogData;
  modal.classList.remove("hidden");
}

function closeBlog() {
  document.getElementById("blogModal").classList.add("hidden");
}
</script>
  
<!-- BLOG READER MODAL -->
<div id="blogModal"
     class="hidden fixed inset-0 z-50 bg-black/30 backdrop-blur-xl">

  <div class="max-w-3xl mx-auto mt-20 bg-white/70 backdrop-blur-2xl
              border border-white/40 rounded-3xl shadow-2xl p-8 relative">

    <!-- CLOSE -->
    <button onclick="closeBlog()"
            class="absolute top-5 right-5 text-gray-500 hover:text-black text-xl">
      ✕
    </button>

    <!-- CONTENT -->
    <div id="blogContent" class="space-y-4 text-gray-700 leading-relaxed">

    </div>

  </div>
