<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ImaninaRamly | Gallery</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      fontFamily: {
        sans: ["Quicksand", "sans-serif"]
      }
    }
  }
}
</script>

<style>
body {
  background-color: #fbf9f8;
  color: #1b1c1c;
  font-family: 'Quicksand', sans-serif;
}

.glass {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
}

.shadow-soft {
  box-shadow: 0 20px 40px -15px rgba(0,0,0,0.12);
}
</style>
</head>

<body class="bg-white">
      
<!-- NAVBAR -->
<div id="navbar"></div>
  
<main class="pt-28 pb-24 relative overflow-hidden">

  <!-- BACKGROUND GLOW -->
  <div class="absolute inset-0 -z-10">
    <div class="absolute inset-0 bg-[#f6f7fb]"></div>
    <div class="absolute top-[-120px] left-[-80px] w-[500px] h-[500px] bg-purple-200/25 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-150px] right-[-100px] w-[600px] h-[600px] bg-pink-200/20 blur-[140px] rounded-full"></div>
  </div>

  <div class="max-w-7xl mx-auto px-6 md:px-8">

    <!-- HEADER -->
    <header class="text-center mb-14">
      <h1 class="text-4xl md:text-5xl font-semibold tracking-tight text-gray-900">
        Dev <span class="text-gray-500">Diary</span>
      </h1>

      <p class="mt-4 text-gray-500 max-w-xl mx-auto leading-relaxed">
        A collection of thoughts, experiments, and things I build along the way.
      </p>
    </header>

 <!-- BLOG LIST -->
    <div class="max-w-5xl mx-auto space-y-8">
      
<!-- BLOG CARD -->
<div onclick="openBlog('blog1')"
     class="cursor-pointer group block rounded-3xl
            bg-white/60 backdrop-blur-xl
            border border-white/40
            shadow-[0_10px_30px_rgba(0,0,0,0.06)]
            hover:scale-[1.02]
            transition-all duration-300
            overflow-hidden">

  <div class="p-7 md:p-8 flex flex-col justify-between min-h-[240px]">

    <!-- TOP -->
    <div>

      <!-- TAG + DATE -->
      <div class="flex items-center justify-between mb-6">

        <span class="text-xs px-3 py-1 rounded-full
                     bg-white/70 border border-white/40 text-gray-600">
          Dev Story
        </span>

        <span class="text-xs text-gray-400">
          16 May 2026
        </span>

      </div>

      <!-- TITLE -->
      <h3 class="text-2xl font-semibold text-gray-900
                 leading-snug group-hover:text-purple-700 transition">

        Learning Laravel Routes

      </h3>

      <!-- DESC -->
      <p class="mt-4 text-gray-500 leading-relaxed text-sm md:text-[15px]">

        A story about how I finally understood web.php in Laravel and how routing actually works behind the scenes.

      </p>

    </div>

    <!-- BOTTOM -->
      <div class="flex items-center gap-2 text-purple-600 text-sm font-medium">

        Read Article

        <span class="group-hover:translate-x-1 transition">
          →
        </span>

      </div>

  </div>
</div>

    </div>
  </div>
</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- MODAL -->
<div id="blogModal"
     class="hidden fixed inset-0 z-50 bg-black/30 backdrop-blur-xl flex items-center justify-center p-6">

  <div class="w-full max-w-6xl h-[85vh] flex gap-6">

    <!-- ARTICLE -->
    <div class="flex-1 bg-white/70 backdrop-blur-2xl
                border border-white/40 rounded-3xl shadow-2xl
                p-8 relative overflow-y-auto">

      <button onclick="closeBlog()"
              class="absolute top-5 right-5 text-gray-500 hover:text-black">
        ✕
      </button>

      <div id="blogContent" class="space-y-4 text-gray-700 leading-relaxed"></div>

    </div>
  </div>
</div>

<script>
function setActiveNav() {

  let current = location.pathname.split("/").pop();

  if (current === "") {
    current = "index.html";
  }

  document.querySelectorAll(".nav-link").forEach(link => {

    const href = link.getAttribute("href");

    if (href === current) {

      link.classList.add(
        "bg-purple-100",
        "text-purple-800",
        "font-semibold"
      );

    }

  });

}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(setActiveNav, 100);
});
</script>
<script src="includes.js"></script>
<script>
const blogs = {
  blog1: `
    <span class="text-xs px-3 py-1 rounded-full bg-purple-100 text-purple-700">
      Dev Story
    </span>

    <span class="text-xs text-gray-400 block mt-2">22 May 2026</span>

    <h2 class="text-2xl md:text-3xl font-semibold text-gray-900 leading-snug">
  Experience of Confusion and Enlightenment in Laravel Routes Studying
</h2>

<div class="mt-6 space-y-4 text-gray-600 leading-relaxed text-sm md:text-[15px]">

  <p>
    When I first started learning Laravel, I simply did not understand anything about its routes/web.php files.
  </p>

  <p>
    As an example, I remember having something like this for the first time:
    <code class="bg-gray-100 px-2 py-1 rounded text-gray-700 text-xs">
      Route::get('/', function () { return view('welcome'); });
    </code>
  </p>

  <p>
    And I thought to myself: "Okay... But how does this actually manage my site?"
  </p>

  <p>
    That way, the whole thing seemed quite magical at the moment: I had entered some URL into the address bar, and Laravel showed me the required page automatically.
  </p>

  <p>
    Then I decided to try my hand and create my first route – /about.
  </p>

  <p>
    It worked, and I understood that each and every URL of my site corresponds to something inside web.php.
  </p>

  <p>
    The other amazing thing I found out about was controllers; thanks to them I was able to organize my code better, placing it not only in web.php.
  </p>

  <p class="font-medium text-gray-800">
    Today, when I look through routes/web.php, all I can see there is a "map" of my application – very simple but extremely powerful.
  </p>

  <p>
    And such a small thing in a framework can actually become very important indeed.
  </p>

</div>
  `
};

function openBlog(id) {
  document.getElementById("blogContent").innerHTML = blogs[id];
  document.getElementById("blogModal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeBlog() {
  document.getElementById("blogModal").classList.add("hidden");
  document.body.style.overflow = "auto";
}
</script>
</body>
</html>
