<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ImaninaRamly | Gallery</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      fontFamily: {
        sans: ["Quicksand", "sans-serif"]
      }
    }
  }
}
</script>

<style>
body {
  background-color: #fbf9f8;
  color: #1b1c1c;
  font-family: 'Quicksand', sans-serif;
}

.glass {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
}

.shadow-soft {
  box-shadow: 0 20px 40px -15px rgba(0,0,0,0.12);
}
</style>
</head>

<body class="bg-white">
      
<!-- NAVBAR -->
<div id="navbar"></div>
  
<main class="pt-28 pb-24 relative overflow-hidden">

  <!-- BACKGROUND GLOW -->
  <div class="absolute inset-0 -z-10">
    <div class="absolute inset-0 bg-[#f6f7fb]"></div>
    <div class="absolute top-[-120px] left-[-80px] w-[500px] h-[500px] bg-purple-200/25 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-150px] right-[-100px] w-[600px] h-[600px] bg-pink-200/20 blur-[140px] rounded-full"></div>
  </div>

  <div class="max-w-7xl mx-auto px-6 md:px-8">

    <!-- HEADER -->
    <header class="text-center mb-14">
      <h1 class="text-4xl md:text-5xl font-semibold tracking-tight text-gray-900">
        Dev <span class="text-gray-500">Diary</span>
      </h1>

      <p class="mt-4 text-gray-500 max-w-xl mx-auto leading-relaxed">
        A collection of thoughts, experiments, and things I build along the way.
      </p>
    </header>

 <!-- BLOG LIST -->
    <div class="max-w-4xl mx-auto space-y-6">
      
<!-- BLOG CARD -->
<div onclick="openBlog('blog1')"
     class="cursor-pointer group rounded-3xl overflow-hidden
            bg-white/60 backdrop-blur-xl
            border border-white/40
            shadow-[0_10px_30px_rgba(0,0,0,0.06)]
            hover:scale-[1.02] transition block">

  <div class="p-6 space-y-4">

    <!-- TAG + DATE -->
    <div class="flex items-center justify-between">

      <div class="flex gap-2">
        <span class="text-xs px-3 py-1 rounded-full
                     bg-white/70 border border-white/40 text-gray-600">
          Dev Story
        </span>
      </div>

      <span class="text-xs text-gray-400">
        22 May 2026
      </span>

    </div>

    <!-- TITLE -->
    <h3 class="text-lg md:text-xl font-medium text-gray-800 group-hover:text-gray-900 transition">
      Learning Laravel Routes
    </h3>

    <!-- DESCRIPTION -->
    <p class="text-sm text-gray-500 leading-relaxed">
      A story about how I finally understood web.php in Laravel and how routing actually works behind the scenes.
    </p>

  </div>
</div>

    </div>
  </div>
</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- MODAL -->
<div id="blogModal"
     class="hidden fixed inset-0 z-50 bg-black/30 backdrop-blur-xl flex items-center justify-center p-6">

  <div class="w-full max-w-6xl h-[85vh] flex gap-6">

    <!-- ARTICLE -->
    <div class="flex-1 bg-white/70 backdrop-blur-2xl
                border border-white/40 rounded-3xl shadow-2xl
                p-8 relative overflow-y-auto">

      <button onclick="closeBlog()"
              class="absolute top-5 right-5 text-gray-500 hover:text-black">
        ✕
      </button>

      <div id="blogContent" class="space-y-4 text-gray-700 leading-relaxed"></div>

    </div>
  </div>
</div>

<script>
function setActiveNav() {

  let current = location.pathname.split("/").pop();

  if (current === "") {
    current = "index.html";
  }

  document.querySelectorAll(".nav-link").forEach(link => {

    const href = link.getAttribute("href");

    if (href === current) {

      link.classList.add(
        "bg-purple-100",
        "text-purple-800",
        "font-semibold"
      );

    }

  });

}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(setActiveNav, 100);
});
</script>
<script src="includes.js"></script>
<script>
const blogs = {
  blog1: `
    <span class="text-xs px-3 py-1 rounded-full bg-purple-100 text-purple-700">
      Dev Story
    </span>

    <span class="text-xs text-gray-400 block mt-2">22 May 2026</span>

    <h2 class="text-2xl md:text-3xl font-semibold text-gray-900 leading-snug"> Learning Laravel Routes: My First Confusing But Eye-Opening Moment </h2> <div class="mt-6 space-y-4 text-gray-600 leading-relaxed text-sm md:text-[15px]"> <p> When I first started learning Laravel, I honestly didn’t understand what was going on with routes/web.php. </p> <p> I remember opening the file for the first time and seeing something like: <code class="bg-gray-100 px-2 py-1 rounded text-gray-700 text-xs">Route::get('/', function () { return view('welcome'); });</code> </p> <p> And my first thought was: <span class="italic text-gray-700">“Okay… but how does this actually control my website?”</span> </p> <p> At that time, routing felt like magic. I could type a URL in the browser, and Laravel just knew what page to show. </p> <p> Things started to make sense when I experimented and created my own route: <code class="bg-gray-100 px-2 py-1 rounded text-gray-700 text-xs">/about</code>. </p> <p> When it worked, I realized something important, every URL is being matched inside web.php. </p> <p> Later, I learned about controllers, and everything became more structured. Instead of putting everything in web.php, I could organize logic properly. </p> <p class="font-medium text-gray-800"> Now I see routes/web.php as a “map” of my application, simple, but very powerful. </p> <p class="text-gray-700"> And this experience taught me that even something small in a framework can have a big meaning once you understand it. </p> </div>
  `
};

function openBlog(id) {
  document.getElementById("blogContent").innerHTML = blogs[id];
  document.getElementById("blogModal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeBlog() {
  document.getElementById("blogModal").classList.add("hidden");
  document.body.style.overflow = "auto";
}
</script>
</body>
</html>
