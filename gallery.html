  darkMode: "class",
  theme: {

<style>

               class="w-full h-56 object-cover group-hover:scale-105 transition duration-500"/>

          <div class="p-5 space-y-2">
            <span class="inline-block text-xs px-3 py-1 rounded-full
                         bg-white/70 border border-white/40 text-gray-600">
              Doodle
            </span>

            <h3 class="font-medium text-gray-800">Morning Clouds</h3>

            <p class="text-sm text-gray-500">
              Soft sky study sketch
            </p>
          </div>

        </div>
      </div>

    </div>

  </div>
</main>
  
<!-- FOOTER -->
<div id="footer"></div>
  
<script>
function setActiveNav() {

  let current = location.pathname.split("/").pop();

  // kalau buka domain root
  // contoh: yoursite.com/
  if (current === "") {
    current = "index.html";
  }

  document.querySelectorAll(".nav-link").forEach(link => {

    const href = link.getAttribute("href");

    if (href === current) {

      link.classList.add(
        "bg-purple-100",
        "text-purple-800",
        "font-semibold"
      );

    }

  });

}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(setActiveNav, 100);
});
</script>
<script src="includes.js"></script>
  
</body>
</html>
