<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ImaninaRamly | Contact</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      fontFamily: {
        sans: ["Quicksand", "sans-serif"]
      }
    }
  }
}
</script>

<style>
body {
  background-color: #fbf9f8;
  color: #1b1c1c;
  font-family: 'Quicksand', sans-serif;
}

.glass {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
}

.shadow-soft {
  box-shadow: 0 20px 40px -15px rgba(0,0,0,0.12);
}
</style>
</head>

<body class="bg-white">

<!-- NAVBAR -->
<div id="navbar"></div>

<main class="pt-24 pb-16">
  <div class="max-w-7xl mx-auto px-6 md:px-8">

    <!-- HEADER -->
    <header class="text-center mb-12">
      <h1 class="text-4xl md:text-[54px] font-bold text-gray-900">
        Let's <span class="text-purple-700">Connect</span>
      </h1>
      <p class="mt-4 text-gray-600 max-w-2xl mx-auto">
        Drop a message and I’ll get back to you soon.
      </p>
    </header>

    <!-- GRID -->
    <div class="grid md:grid-cols-12 gap-8">

      <!-- SIDEBAR -->
      <aside class="md:col-span-4 space-y-6">

        <div class="bg-white rounded-xl p-6 shadow-soft border text-center">
          <img src="img1.jpeg" class="w-24 h-24 mx-auto rounded-full mb-4"/>
          <h3 class="font-bold">Hi there 👋</h3>
          <p class="text-gray-500 text-sm mt-2">I usually reply fast!</p>
        </div>

      </aside>
      
   <!-- FORM -->
      <section class="md:col-span-8 bg-white rounded-xl shadow-soft border p-6">

        <form action="https://formspree.io/f/xpqbgnop" class="flex flex-col gap-md" method="POST">

          <input name="name" placeholder="Name"
       class="w-full border rounded-full px-4 py-3"/>

<input name="email" placeholder="Email"
       class="w-full border rounded-full px-4 py-3"/>

<input name="subject" placeholder="Subject"
       class="w-full border rounded-full px-4 py-3"/>

<textarea name="message" placeholder="Message"
          class="w-full border rounded-xl px-4 py-3 h-40"></textarea>

          <button class="bg-purple-700 text-white px-6 py-3 rounded-full hover:scale-105 transition">
            Send Message
          </button>

        </form>

      </section>

    </div>
  </div>
</main>
  
<!-- Map/Location Teaser -->
<section class="mb-xl px-container-margin max-w-7xl mx-auto">
<div class="w-full h-[300px] rounded-xl overflow-hidden relative shadow-sm border-2 border-surface-container">
<div class="absolute inset-0 bg-primary/5 pointer-events-none"></div>
<img alt="Illustrated Map Background" class="w-full h-full object-cover" data-alt="A highly stylized, minimalist illustrated map of a charming neighborhood. The map features soft pastel colors like mint green, lavender, and pale pink, with cute rounded icons for parks and cafes. The lighting is bright and airy, giving the entire scene a whimsical, marshmallow-like tactile quality consistent with a soft creative portfolio aesthetic." data-location="Tokyo, Japan" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-DkkVaKIKNu8YRQsLVEAtmyIcSB_pKa-d1yeN1BNnrcsnwYTw7MVS_0guE-sLXcPwgS1g484jI2WYByKy8YnnJRBBI0mlXEiliji5eWcUdpe4kIGxeyocI54oZp-MU3sfm2miz7urqEkkyLsPBZjNd3kffDXnZQipIOS01k2SV_IbJue9q8cK19wH_Ptu0KNR4msvdaoHU6MnX75MBHuL5srZTREVdApPhy9pfjAq5mFkT6GJE6MIw62qlmnVndIpKj9d5Gfbwzex"/>
<div class="absolute bottom-md left-md bg-white/90 backdrop-blur-md p-md rounded-lg shadow-md border-2 border-primary-container">
<p class="font-headline-sm text-primary">Based in,</p>
<p class="font-body-md text-on-surface-variant">Sungai Petani, Kedah</p>
</div>
</div>
</section>
      
<!-- FOOTER -->
<div id="footer"></div>
  
<script>
function setActiveNav() {
  const current = location.pathname.split("/").pop();

  document.querySelectorAll(".nav-link").forEach(link => {
    if (link.getAttribute("href") === current) {
      link.classList.add("bg-purple-100", "text-purple-800", "font-semibold");
    }
  });
}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(setActiveNav, 100);
});
</script>
<script src="includes.js"></script>
  
</body>
</html>
