<script>

  theme: {

<style>
body {

  color: #1b1c1c;

          </div>

        <div class="p-5">

          <h3 class="font-bold mt-2">Forest Friends</h3>
          <p class="text-gray-500 text-sm">Character design exploration</p>

    </div>

</main>
      
<!-- FOOTER -->
<div id="footer"></div>
      
<!-- FAB -->
<button class="fixed bottom-container-margin right-container-margin w-16 h-16 bg-primary text-on-primary rounded-full shadow-xl shadow-primary/30 flex items-center justify-center hover:scale-110 active:scale-95 transition-all duration-200 z-40">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
</button>

<script>
function setActiveNav() {
  const current = location.pathname.split("/").pop();

  document.querySelectorAll(".nav-link").forEach(link => {
    if (link.getAttribute("href") === current) {
      link.classList.add("bg-purple-100", "text-purple-800", "font-semibold");
    }
  });
}

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(setActiveNav, 100);
});
</script>
<script src="includes.js"></script>
