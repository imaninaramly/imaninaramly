              class="absolute top-5 right-5 text-gray-500 hover:text-black">

<script src="includes.js"></script>
<script>
const blogs = {
  blog1: `
    <span class="text-xs px-3 py-1 rounded-full bg-purple-100 text-purple-700">
      Dev Story
    </span>

    <span class="text-xs text-gray-400 block mt-2">16 May 2026</span>

    <h2 class="text-2xl md:text-3xl font-semibold text-gray-900 leading-snug">
  Learning Laravel Routes
</h2>

<div class="mt-6 space-y-4 text-gray-600 leading-relaxed text-sm md:text-[15px]">

  <p>
    When I first started learning Laravel, I simply did not understand anything about routes/web.php files.
  </p>

  <p>
    For example, I remember seeing something like this for the first time:
    <code class="bg-gray-100 px-2 py-1 rounded text-gray-700 text-xs">
      Route::get('/', function () { return view('welcome'); });
    </code>
  </p>

  <p>
    And I thought to myself: "Okay... But how does this actually works?"
  </p>

  <p>
    That way, the whole thing seemed quite unreal at the moment. I had entered some URL into the address bar, and Laravel showed me the required page automatically.
  </p>

  <p>
    Then I decided to try my hand and create my first route, /about.
  </p>

  <p>
    It worked, and I understood that each and every URL of my site corresponds to something inside web.php.
  </p>

  <p>
    The other amazing thing I found out about was controllers, thanks to them I was able to organize my code better, placing it not only in web.php.
  </p>

  <p class="font-medium text-gray-800">
    Today, when I look through routes/web.php, all I can see there is a "map" of my application, very simple but extremely powerful.
  </p>

  <p>
    And such a small thing in a framework can actually become very important indeed.
  </p>

</div>
  `
};

function openBlog(id) {
  document.getElementById("blogContent").innerHTML = blogs[id];
  document.getElementById("blogModal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeBlog() {
  document.getElementById("blogModal").classList.add("hidden");
  document.body.style.overflow = "auto";
}
</script>
